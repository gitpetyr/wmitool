name: Build

on:
  push:
    branches: ["main"]
    tags: ["v*"]
  pull_request:
    branches: ["main"]

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install . pyinstaller

      - name: Build exe
        run: |
          pyinstaller --onefile --icon=NONE --name wmitool wmitool/__main__.py

      - name: Upload artifact
        uses: actions/upload-artifact@v5
        with:
          name: wmitool-windows
          path: dist/wmitool.exe
          retention-days: 30

      - name: Upload to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/wmitool.exe
